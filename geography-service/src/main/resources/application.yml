server:
  port: ${SERVER_PORT:8080}
spring:
  application:
    name: geography-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    web:
      pageable:
        one-indexed-parameters: true

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: geography
        format_sql: true

  flyway:
    enabled: true
    create-schemas: true
    locations: classpath:db/migration
    default-schema: geography

logging:
  level:
    root: INFO
    org:
      springframework:
        web: INFO
      hibernate:
        SQL: OFF
        type:
          descriptor:
            sql: OFF
